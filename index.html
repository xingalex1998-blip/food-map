<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>美食地图 · 名家推荐</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div class="header-logo">
    <div class="logo-icon">🍜</div>
    <div>
      <div class="logo-text">美食地图</div>
      <div class="logo-sub">名家推荐 · 精选好味</div>
    </div>
  </div>
  <div class="header-right">
    <!-- 地区下拉选择器 -->
    <div class="region-selector" id="regionSelector">
      <button class="region-selector-btn" id="regionSelectorBtn" onclick="toggleRegionDropdown()">
        <span class="region-selector-pin">📍</span>
        <span class="region-selector-label" id="regionSelectorLabel">全国</span>
        <span class="region-selector-arrow" id="regionSelectorArrow">▾</span>
      </button>
      <div class="region-dropdown" id="regionDropdown">
        <div class="region-search-wrap">
          <input class="region-search-input" id="regionSearchInput"
            type="text" placeholder="搜索地区…"
            oninput="filterRegionList(this.value)"
            onclick="event.stopPropagation()"
          />
        </div>
        <div class="region-list" id="regionList"></div>
      </div>
    </div>
  </div>
</header>


<!-- ── 地图区域 ── -->
<div class="map-wrapper">
  <div class="map-loading" id="mapLoading">
    <div class="loading-icon">🗺️</div>
    <div class="loading-text">地图加载中…</div>
  </div>

  <div id="map"></div>

  <div class="fab-group">
    <button class="fab fab-list" onclick="toggleSidePanel()" title="店铺列表">📋</button>
    <button class="fab fab-location" onclick="locateUser()" title="我的位置">📍</button>
  </div>

  <!-- 侧边列表 -->
  <div class="side-panel" id="sidePanel">
    <div class="side-panel-header">
      <div class="side-panel-title-row">
        <div class="side-panel-title">精选店铺</div>
        <button class="side-panel-close" onclick="toggleSidePanel()">✕</button>
      </div>
      <!-- 搜索框 -->
      <div class="side-panel-search-wrap">
        <span class="side-panel-search-icon">🔍</span>
        <input
          class="side-panel-search-input"
          id="sidePanelSearch"
          type="text"
          placeholder="搜索店铺名称…"
          oninput="onSidePanelSearch(this.value)"
        />
        <button class="side-panel-search-clear" id="sidePanelSearchClear" onclick="clearSidePanelSearch()" style="display:none">✕</button>
      </div>
      <!-- 筛选行：口味 + 推荐人 -->
      <div class="sp-filter-row">
        <!-- 口味下拉 -->
        <div class="sp-dropdown" id="spCategoryDropdown">
          <button class="sp-dropdown-btn" id="spCategoryBtn" onclick="toggleSpDropdown('spCategoryDropdown')">
            <span class="sp-dropdown-label" id="spCategoryLabel">口味</span>
            <span class="sp-dropdown-arrow">▾</span>
          </button>
          <div class="sp-dropdown-menu" id="spCategoryMenu"></div>
        </div>
        <!-- 推荐人下拉 -->
        <div class="sp-dropdown" id="spCuratorDropdown">
          <button class="sp-dropdown-btn" id="spCuratorBtn" onclick="toggleSpDropdown('spCuratorDropdown')">
            <span class="sp-dropdown-label" id="spCuratorLabel">推荐人</span>
            <span class="sp-dropdown-arrow">▾</span>
          </button>
          <div class="sp-dropdown-menu" id="spCuratorMenu"></div>
        </div>
      </div>
      <!-- 数量 -->
      <div class="side-panel-count" id="sidePanelCount">共 0 家</div>
    </div>
    <div class="side-panel-list" id="sidePanelList"></div>
  </div>

  <!-- ── 弹出详情卡片 ── -->
  <!-- 遮罩层：点击关闭 -->
  <div class="popup-overlay" id="popupOverlay" onclick="closePopup()">
    <div class="popup-card" id="popupCard" onclick="event.stopPropagation()">

      <!-- 封面图 -->
      <div class="popup-cover" id="popupCover">
        <div class="popup-cover-placeholder" id="popupEmoji"></div>
        <span class="popup-category-badge" id="popupCategory"></span>
        <button class="popup-close" onclick="closePopup()">✕</button>
      </div>

      <!-- 拖拽把手 -->
      <div class="popup-handle"></div>

      <div class="popup-body">

        <!-- 餐厅名 -->
        <div class="popup-name" id="popupName"></div>

        <!-- 星级 + 评分 -->
        <div class="popup-meta">
          <span class="popup-stars" id="popupStars"></span>
          <span class="popup-rating-num" id="popupRatingNum"></span>
          <span class="popup-rating-src" id="popupRatingSrc"></span>
        </div>

        <!-- 推荐人 -->
        <div class="popup-curator" id="popupCurator"></div>

        <!-- 图片区（1张或2张，由JS动态渲染） -->
        <div class="popup-photos" id="popupPhotos" style="display:none"></div>

        <!-- 简介 -->
        <div class="popup-desc" id="popupDesc"></div>

        <!-- 地址行 -->
        <div class="popup-info-list">
          <div class="popup-info-row" id="popupAddressRow">
            <span class="popup-info-icon">📍</span>
            <span class="popup-info-text" id="popupInfoAddress"></span>
            <span class="popup-info-arrow">›</span>
          </div>
        </div>

        <!-- 标签 -->
        <div class="popup-tags" id="popupTags"></div>

        <!-- 来源：平台 logo -->
        <div class="popup-source" id="popupSource" style="display:none">
          <span class="popup-source-label">来源</span>
          <a class="popup-source-logo-link" id="popupSourceLink" href="#" target="_blank" rel="noopener">
            <img class="popup-source-logo" id="popupSourceLogo" src="" alt="" />
          </a>
        </div>

      </div>
    </div>
  </div>

</div><!-- end .map-wrapper -->

<div class="toast" id="toast"></div>

<!-- 数据层 -->
<script src="data.js"></script>
<!-- 应用逻辑 -->
<script src="app.js?v=18"></script>

<!-- 高德地图安全密钥 -->
<script>
window._AMapSecurityConfig = {
  securityJsCode: localStorage.getItem('amap_security_code') || '1cec5aea265999d7fa14e96217c041b5',
};
</script>
<!-- 动态加载高德地图 JS API -->
<script>
(function() {
  const key = localStorage.getItem('amap_key_override') || 'bff961046fdefbc7fa4bb67a40e7ef93';
  const s = document.createElement('script');
  s.src = 'https://webapi.amap.com/maps?v=2.0&key=' + key + '&callback=initAMap';
  document.body.appendChild(s);
})();
</script>

</body>
</html>
